<section class="home-page">
	<header class="home-header" *ngIf="usuario">
		<div class="user-badge">
			<span>Jugador</span>
			<strong>{{ usuario.nombre }}</strong>
		</div>
	</header>

	<div class="home-container">
		<div class="home-emoji">👾</div>

		<div class="home-content">
			<h1 class="home-title">JUEGOS 1000 TRES</h1>
			<p class="home-subtitle">Plataforma de minijuegos online</p>

			<div class="home-actions" *ngIf="!usuario">
				<generic-button color="purple" link="/login">Iniciar sesión</generic-button>
				<generic-button color="purple" link="/register">Registrarse</generic-button>
				<generic-button color="green" (click)="entrarInvitado()">Entrar como invitado</generic-button>
			</div>

			<div class="home-actions" *ngIf="usuario">
				<generic-button color="green" link="/sala">Sala de juegos</generic-button>
				<generic-button color="gray" (click)="cerrarSesion()">Cerrar sesión</generic-button>
			</div>
		</div>
	</div>
</section>
