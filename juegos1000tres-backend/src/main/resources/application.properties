spring.application.name=juegos1000tres-backend
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/juegos1000tres
spring.datasource.username=juegos_user
spring.datasource.password=juegos_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.rest.base-path=/api

jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=480

ia.google.api-key=${GOOGLE_AI_STUDIO_API_KEY:}
ia.google.model=gemini-2.0-flash
ia.google.base-url=https://generativelanguage.googleapis.com/v1beta
